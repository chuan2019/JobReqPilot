# =============================================================================
# JobReqPilot — Docker Compose (base)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference server
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: jobreqpilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - jobreqpilot

  # ---------------------------------------------------------------------------
  # Redis — result & embedding cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jobreqpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobreqpilot

  # ---------------------------------------------------------------------------
  # MCP Server — Job Search
  # ---------------------------------------------------------------------------
  mcp-job-search:
    build:
      context: ./mcp-servers/job-search
    container_name: jobreqpilot-mcp-job-search
    ports:
      - "8001:8001"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - MCP_TRANSPORT=sse
      - SERPAPI_KEY=${SERPAPI_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8001/sse', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - jobreqpilot

  # ---------------------------------------------------------------------------
  # Backend — FastAPI REST API + orchestrator
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    container_name: jobreqpilot-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-llama3.2}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - REDIS_URL=redis://redis:6379/0
      - MCP_JOB_SEARCH_URL=http://mcp-job-search:8001
      - MCP_SUMMARIZE_URL=http://mcp-summarize:8002
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy
      mcp-job-search:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r=httpx.get('http://localhost:8000/health', timeout=3); assert r.status_code==200\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - jobreqpilot

volumes:
  ollama_data:
  redis_data:

networks:
  jobreqpilot:
    driver: bridge
