# =============================================================================
# JobReqPilot — Docker Compose Override (dev)
# Automatically loaded by `docker compose up`.
# Adds dev-friendly settings: exposed ports, volume mounts, hot-reload.
#
# For production, run:
#   docker compose -f docker-compose.yml up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Ollama — expose port on localhost for direct testing
  # (already exposed in base, but override lets us add dev-only env vars)
  # ---------------------------------------------------------------------------
  ollama:
    environment:
      - OLLAMA_DEBUG=1

  # ---------------------------------------------------------------------------
  # Redis — expose port on localhost for redis-cli debugging
  # ---------------------------------------------------------------------------
  redis:
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # Placeholder services below will be uncommented as they are implemented
  # in later phases. Kept here to show the intended dev configuration.
  # ---------------------------------------------------------------------------

  backend:
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - LOG_LEVEL=debug

  mcp-job-search:
    volumes:
      - ./mcp-servers/job-search/server.py:/app/server.py
      - ./mcp-servers/job-search/tools:/app/tools

  # mcp-summarize:
  #   build:
  #     context: ./mcp-servers/summarize
  #   ports:
  #     - "8002:8002"
  #   volumes:
  #     - ./mcp-servers/summarize:/app
  #   env_file:
  #     - .env

  frontend:
    build:
      context: ./frontend
      target: dev
    ports: !override
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://backend:8000
